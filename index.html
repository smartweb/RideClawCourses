<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龙虾出行学院</title>
  <meta name="description" content="龙虾出行团队学习平台，涵盖行业分享、商业策略、供应链、技术通识四大板块。">
  <style>
    :root {
      --bg: #080a12;
      --bg-elevated: #0c0e18;
      --bg-card: #0f111c;
      --bg-card-hover: #131520;
      --accent: #b8985e;
      --accent-light: #d4b87a;
      --accent-glow: rgba(184,152,94,0.08);
      --text: #e8e6e1;
      --text-secondary: #9a958a;
      --text-muted: #6b665c;
      --border: rgba(255,255,255,0.05);
      --border-light: rgba(255,255,255,0.08);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
      --shadow: 0 4px 24px rgba(0,0,0,0.5);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.6);
      --shadow-accent: 0 4px 32px rgba(184,152,94,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Source Han Sans SC", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== Noise Texture Overlay ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    /* ===== Header ===== */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(8,10,18,0.75);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.01em;
    }
    .header-logo .logo-mark {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #080a12;
    }
    .header-logo span { color: var(--accent); }
    .header-nav { display: flex; align-items: center; gap: 8px; }
    .header-nav a {
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      transition: all .25s cubic-bezier(0.16,1,0.3,1);
      letter-spacing: -0.01em;
    }
    .header-nav a:hover {
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }
    .header-nav a.nav-cta {
      background: linear-gradient(135deg, var(--accent), #a08040);
      color: #080a12;
      font-weight: 600;
    }
    .header-nav a.nav-cta:hover {
      box-shadow: var(--shadow-accent);
      transform: translateY(-1px);
    }
    .header-nav a.nav-cta:active {
      transform: translateY(0) scale(0.98);
    }
    .mobile-menu-btn {
      display: none;
      background: none; border: none;
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
      padding: 6px;
    }

    /* ===== Hero ===== */
    .hero {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      padding: 120px 32px 80px;
      position: relative;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .hero-bg::before {
      content: '';
      position: absolute;
      top: -30%; left: 60%;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(184,152,94,0.08) 0%, transparent 65%);
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      bottom: -20%; left: -10%;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(100,120,160,0.05) 0%, transparent 60%);
    }
    .hero-inner {
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 80px;
      align-items: center;
    }
    .hero-left {
      max-width: 680px;
    }
    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
      background: rgba(184,152,94,0.08);
      border: 1px solid rgba(184,152,94,0.15);
      border-radius: 100px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .hero h1 {
      font-size: clamp(2.8rem, 5.5vw, 4.2rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }
    .hero h1 .accent {
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-desc {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 520px;
      line-height: 1.7;
      margin-bottom: 40px;
      letter-spacing: -0.01em;
    }
    .hero-cta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--accent), #a08040);
      color: #080a12;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: all .25s cubic-bezier(0.16,1,0.3,1);
      letter-spacing: -0.01em;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-accent);
    }
    .btn-primary:active {
      transform: translateY(0) scale(0.98);
    }
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 500;
      border: 1px solid var(--border-light);
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      transition: all .25s cubic-bezier(0.16,1,0.3,1);
    }
    .btn-ghost:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.03);
    }
    .btn-ghost:active {
      transform: scale(0.98);
    }
    .hero-right {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .hero-stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      transition: all .3s cubic-bezier(0.16,1,0.3,1);
    }
    .hero-stat-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-light);
      transform: translateY(-2px);
    }
    .hero-stat-num {
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }
    .hero-stat-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 0.02em;
    }

    /* ===== Section ===== */
    .section {
      padding: 100px 32px;
      max-width: 1280px;
      margin: 0 auto;
    }
    .section-header {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 48px;
      align-items: end;
      margin-bottom: 56px;
    }
    .section-title {
      font-size: clamp(1.6rem, 3vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .section-subtitle {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.7;
      max-width: 65ch;
    }

    /* ===== Category Pills ===== */
    .cat-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .cat-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 100px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      transition: all .25s cubic-bezier(0.16,1,0.3,1);
      cursor: pointer;
    }
    .cat-pill:hover {
      color: var(--text);
      background: var(--bg-card-hover);
      border-color: var(--border-light);
    }
    .cat-pill.cat-active {
      background: rgba(184,152,94,0.1);
      border-color: rgba(184,152,94,0.25);
      color: var(--accent);
    }
    .cat-pill .cat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background .25s;
    }
    .cat-pill.cat-active .cat-dot {
      background: var(--accent);
    }

    /* ===== Course Grid — Bento-style Asymmetric ===== */
    .course-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-auto-rows: minmax(200px, auto);
      gap: 16px;
    }
    .course-card {
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all .35s cubic-bezier(0.16,1,0.3,1);
      text-decoration: none;
      color: var(--text);
      position: relative;
    }
    .course-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      opacity: 0;
      transition: opacity .35s;
    }
    .course-card:hover {
      background: var(--bg-card-hover);
      border-color: rgba(184,152,94,0.15);
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg), var(--shadow-accent);
    }
    .course-card:hover::before {
      opacity: 1;
    }
    .course-card-body {
      padding: 28px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .course-tag {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 18px;
      width: fit-content;
    }
    .tag-industry { background: rgba(168,120,220,0.1); color: #c8a8e8; }
    .tag-strategy { background: rgba(100,180,120,0.1); color: #88d4a0; }
    .tag-supply { background: rgba(80,150,210,0.1); color: #7cb8e8; }
    .tag-tech { background: rgba(220,140,80,0.1); color: #e8b070; }
    .course-card h3 {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    .course-card p {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .course-card-footer {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .course-format {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.02em;
    }
    .course-arrow {
      color: var(--accent);
      font-size: 16px;
      font-weight: 600;
      transition: transform .25s cubic-bezier(0.16,1,0.3,1);
    }
    .course-card:hover .course-arrow {
      transform: translateX(5px);
    }

    /* Unified course card sizing */
    .course-card {
      grid-column: span 4;
    }

    /* ===== Footer ===== */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 56px 32px;
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .footer-left {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .footer-left strong {
      color: var(--text-secondary);
      font-weight: 600;
    }
    .footer-right {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ===== Responsive ===== */
    @media (max-width: 1024px) {
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 48px;
      }
      .hero-right {
        flex-direction: row;
        flex-wrap: wrap;
      }
      .hero-stat-card {
        flex: 1;
        min-width: 140px;
      }
      .section-header {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .course-card { grid-column: span 6; }
    }
    @media (max-width: 768px) {
      .header-inner { padding: 0 20px; }
      .header-nav { display: none; }
      .mobile-menu-btn { display: block; }
      .hero { padding: 120px 20px 60px; min-height: auto; }
      .hero h1 { font-size: 2.4rem; }
      .hero-desc { font-size: 1rem; }
      .section { padding: 64px 20px; }
      .course-grid {
        grid-template-columns: 1fr;
      }
      .course-card {
        grid-column: span 1;
      }
      .site-footer {
        flex-direction: column;
        text-align: center;
        padding: 40px 20px;
      }
    }

    /* ===== Scroll Reveal ===== */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity .7s cubic-bezier(0.16,1,0.3,1), transform .7s cubic-bezier(0.16,1,0.3,1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

    const grid = document.getElementById('course-grid');
    const pills = document.querySelectorAll('.cat-pill');

    function render(filter) {
      const items = filter === 'all' ? COURSES : COURSES.filter(c => c.id === filter);
      grid.innerHTML = items.map((c, i) => `
        <a class="course-card reveal" href="${c.path}" data-cat="${c.id}" style="transition-delay:${i * 60}ms">
          <div class="course-card-body">
            <span class="course-tag ${c.tagClass}">${c.tag}</span>
            <h3>${c.title}</h3>
            <p>${c.desc}</p>
          </div>
          <div class="course-card-footer">
            <span class="course-format">${c.format}</span>
            <span class="course-arrow">→</span>
          </div>
        </a>
      `).join('');

      // Re-observe new elements
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    // IntersectionObserver for scroll reveal
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08 });

    // Filter click handlers
    pills.forEach(pill => {
      pill.addEventListener('click', () => {
        pills.forEach(p => p.classList.remove('cat-active'));
        pill.classList.add('cat-active');
        render(pill.dataset.filter);
      });
    });

    // Initial render
    render('all');
  </script>
